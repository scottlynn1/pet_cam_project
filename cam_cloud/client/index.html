<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pet_cam_client</title>
  </head>
  <body>
    <div id="container" class="container">
      <div class="top-bar">
        <div id="form-menu" class="formmenu">
          <form id="login-form" class="loginform">
            <input type="text" name="username" required placeholder="Username">
            <input type="password" name="password" required placeholder="Password">
            <button type="submit">Login</button>
            <p id="error-message"></p>
          </form>
        </div>
        <div id="device-menu" class="devicemenu hidden">
          <label for="cam-select" class="visually-hidden">Camera</label>
          <select id="cam-select">
            <option id="default-select" value="" disabled selected>Select A Camera</option>
          </select>
          <button id="toggle-rename-btn" class="kebab-menu-btn hidden" aria-label="Open menu">
            &#8942;
          </button>
        </div>
        <div id="rename-wrapper" class="rename-wrapper hidden">
          <input type="text" id="cam-name-input" class="sleek-input" placeholder="Rename camera..." maxlength="32">
          <button id="cam-name-save" class="sleek-btn">Save Name</button>
        </div>
      </div>

      <div id="feed-section" class="feedsection hidden">
        <img id="feed" src="" class="feed"/>
        <button id="feed-stop" class="feedstop">X</button>
      </div>

      <div id="control-section" class="controlsection hidden">
        <div id="laser-wrapper" class="laserwrapper">
          <button id="laser-start" class="laserstart">Activate Laser</button>
        </div>
        <div id="controller" class="controller hidden">
          <button id="laser-stop" class="laserstop">X</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
